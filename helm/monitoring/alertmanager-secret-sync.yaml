apiVersion: v1
kind: Pod
metadata:
  name: alertmanager-secret-sync
  namespace: monitoring
  labels:
    app: alertmanager-secret-sync
spec:
  serviceAccountName: alertmanager-csi-sa
  restartPolicy: Never
  containers:
    - name: sync
      image: busybox:1.36
      command: ["sh", "-c", "echo secrets synced"]
      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: alertmanager-aws-secrets
