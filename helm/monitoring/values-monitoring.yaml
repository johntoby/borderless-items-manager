prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    additionalScrapeConfigs:
      - job_name: "borderless-backend"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - borderless
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

grafana:
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 31000

alertmanager:
  enabled: true
  config:
    global:
      smtp_from: "obacloud007@gmail.com"
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_auth_username: "obacloud007@gmail.com"
      smtp_require_tls: true
    route:
      receiver: "email"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: "email"
        email_configs:
          - to: "obacloud007@gmail.com"
            auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp/smtp_password
            send_resolved: true
  alertmanagerSpec:
    secrets:
      - alertmanager-smtp
    volumes:
      - name: alertmanager-smtp
        secret:
          secretName: alertmanager-smtp
