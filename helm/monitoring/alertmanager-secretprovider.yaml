apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager-csi-sa
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: ${CSI_ROLE_ARN}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: alertmanager-aws-secrets
  namespace: monitoring
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "${CLUSTER_NAME}/alertmanager"
        objectType: "secretsmanager"
        jmesPath:
          - path: smtp_password
            objectAlias: smtp_password
  secretObjects:
    - secretName: alertmanager-smtp
      type: Opaque
      data:
        - objectName: smtp_password
          key: smtp_password
