namespace: borderless

backend:
  image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/borderless-cluster-backend
  tag: latest
  replicas: 2
  port: 5000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

frontend:
  image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/borderless-cluster-frontend
  tag: latest
  replicas: 2
  port: 80
  serviceType: LoadBalancer
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

postgres:
  image: postgres
  tag: 15-alpine
  port: 5432
  database: appdb
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  storage: 1Gi
  storageClassName: gp2

config:
  corsOrigin: "http://localhost"

secret:
  dbUser: cG9zdGdyZXM=
  dbPassword: cGFzc3dvcmQ=
