namespace: borderless

backend:
  image: 266735814791.dkr.ecr.us-east-1.amazonaws.com/borderless-cluster-backend
  tag: latest
  replicas: 2
  port: 5000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

frontend:
  image: 266735814791.dkr.ecr.us-east-1.amazonaws.com/borderless-cluster-frontend
  tag: latest
  replicas: 2
  port: 80
  serviceType: LoadBalancer
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

postgres:
  image: postgres
  tag: 15-alpine
  port: 5432
  database: appdb
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  storage: 1Gi
  storageClassName: gp2

config:
  corsOrigin: "http://a2d25bfe653fd47819ebd9fb11ce3fd3-1880535953.us-east-1.elb.amazonaws.com"

secret:
  csiRoleArn: ""  # injected by CI: --set secret.csiRoleArn=<terraform output csi_role_arn>
  appSecretName: "borderless-cluster/app"
