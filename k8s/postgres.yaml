apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: borderless-postgres
  namespace: borderless
spec:
  serviceName: borderless-postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: borderless-postgres
  template:
    metadata:
      labels:
        app: borderless-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: borderless-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: borderless-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: borderless-secret
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: borderless-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: borderless-postgres-service
  namespace: borderless
spec:
  selector:
    app: borderless-postgres
  ports:
    - port: 5432
      targetPort: 5432
