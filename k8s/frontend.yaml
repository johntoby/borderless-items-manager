apiVersion: apps/v1
kind: Deployment
metadata:
  name: borderless-frontend
  namespace: borderless
spec:
  replicas: 3
  selector:
    matchLabels:
      app: borderless-frontend
  template:
    metadata:
      labels:
        app: borderless-frontend
    spec:
      containers:
        - name: frontend
          image: johntoby/borderless-items-manager-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: borderless-frontend-service
  namespace: borderless
spec:
  type: NodePort
  selector:
    app: borderless-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
