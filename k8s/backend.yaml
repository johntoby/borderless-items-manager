apiVersion: apps/v1
kind: Deployment
metadata:
  name: borderless-backend
  namespace: borderless
spec:
  replicas: 3
  selector:
    matchLabels:
      app: borderless-backend
  template:
    metadata:
      labels:
        app: borderless-backend
    spec:
      containers:
        - name: backend
          image: johntoby/borderless-items-manager-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: borderless-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: borderless-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: borderless-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: borderless-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: borderless-secret
                  key: DB_PASSWORD
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: borderless-config
                  key: CORS_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: borderless-backend-service
  namespace: borderless
spec:
  selector:
    app: borderless-backend
  ports:
    - port: 5000
      targetPort: 5000
