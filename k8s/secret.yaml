# For LOCAL MINIKUBE USE ONLY.
# On EKS, secrets are managed by AWS Secrets Manager via the Secrets Store CSI driver.
# Never commit real credentials here. Use placeholder values for local dev only.
apiVersion: v1
kind: Secret
metadata:
  name: borderless-secret
  namespace: borderless
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "changeme-local-only"
  POSTGRES_PASSWORD: "changeme-local-only"
