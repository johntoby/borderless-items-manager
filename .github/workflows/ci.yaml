name: Borderless Items Manager CI/CD pipeline

on:
  push:
    branches: [monitoring]
  pull_request:
    branches: [monitoring]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: borderless-cluster-backend
  ECR_FRONTEND_REPO: borderless-cluster-frontend
  EKS_CLUSTER_NAME: borderless-cluster

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Secrets Store CSI Driver
        run: |
          helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
          helm repo add aws-secrets-manager https://aws.github.io/secrets-store-csi-driver-provider-aws
          helm repo update
          helm upgrade --install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
            --namespace kube-system \
            --set syncSecret.enabled=true \
            --set enableSecretRotation=true \
            --wait
          helm upgrade --install secrets-provider-aws aws-secrets-manager/secrets-store-csi-driver-provider-aws \
            --namespace kube-system \
            --wait

      - name: Get CSI role ARN
        id: csi-role
        run: |
          echo "arn=$(aws iam get-role --role-name borderless-cluster-csi-secrets-role --query Role.Arn --output text)" >> $GITHUB_OUTPUT

      - name: Deploy app with Helm
        run: |
          helm upgrade --install borderless ./helm \
            -f helm/values-eks.yaml \
            --set backend.image=${{ needs.build-and-push.outputs.ecr_registry }}/${{ env.ECR_BACKEND_REPO }} \
            --set frontend.image=${{ needs.build-and-push.outputs.ecr_registry }}/${{ env.ECR_FRONTEND_REPO }} \
            --set secret.csiRoleArn=${{ steps.csi-role.outputs.arn }} \
            --wait --timeout 5m

      - name: Deploy monitoring stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          CSI_ROLE_ARN=${{ steps.csi-role.outputs.arn }} \
          CLUSTER_NAME=${{ env.EKS_CLUSTER_NAME }} \
          envsubst < helm/monitoring/alertmanager-secretprovider.yaml | kubectl apply -f -
          kubectl delete pod alertmanager-secret-sync -n monitoring --ignore-not-found
          kubectl apply -f helm/monitoring/alertmanager-secret-sync.yaml
          kubectl wait --for=condition=Ready pod/alertmanager-secret-sync -n monitoring --timeout=60s || true
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }} \
          envsubst < helm/monitoring/values-monitoring.yaml > /tmp/values-monitoring-rendered.yaml
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            -n monitoring --create-namespace \
            -f /tmp/values-monitoring-rendered.yaml \
            --wait --timeout 10m
          kubectl apply -f helm/monitoring/servicemonitor.yaml
          kubectl apply -f helm/monitoring/alertrules.yaml

      - name: Get frontend LoadBalancer URL
        run: |
          echo "Waiting for LoadBalancer..."
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress}' \
            service/borderless-frontend-service -n borderless --timeout=120s
          kubectl get svc borderless-frontend-service -n borderless
